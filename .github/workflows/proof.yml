# Local test workflow for PRoof (uses local action so act can run it)
name: PRoof
on: [pull_request]
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install action dependencies
        run: npm ci
      - name: Build action
        run: npm run build
      - uses: ./
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          run_tests: true
          check_issue: true
          detect_hallucinations: true
          block_merge: false
